{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LSOYS AI Monitor</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="brand">
            <div class="brand-icon">🛡️</div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to LSOYS AI Monitor</p>
        </div>

        {% if messages %}
        {% for msg in messages %}
        <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>
        {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'accounts:login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" required autofocus placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
    </div>
</div>
</body>
</html>
